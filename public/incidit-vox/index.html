<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incidit Vox</title>
  <link rel="stylesheet" href="/assets/css/inciditvox.css">
  <!-- Chargement de la bibliothèque FFT.js depuis CDN -->
  <script src="libs/fft.min.js"></script>

</head>
<body>
  <header>
    <h1>Incidit Vox</h1>
    <p>Analyse vibratoire artisanale d’archets</p>
  </header>

  <main>
    <section id="upload-section">
      <h2>Fichier de données</h2>
      <input type="file" id="file-input" accept=".txt">
      <button id="analyze-btn">Analyser</button>
    </section>

    <section id="results-section">
      <h2>Résultats</h2>
      <div class="result-columns">
        <div id="summary"></div>
        <div id="peaks-table"></div>
      </div>
  
      <div id="spectrum">
        <!-- Graphique du spectre -->
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; Ivo Incidit</p>
  </footer>

  <!-- Chargement du cœur de l'application -->
  <script src="js/signal.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
